# =============================================================================
# Entidades de organizacion para Backstage
# Mapean los usuarios/grupos de Keycloak al catalogo de Backstage
# =============================================================================
---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: platform-team
  description: Equipo de plataforma - acceso completo
spec:
  type: team
  children: []
---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: developers
  description: Equipo de desarrollo - acceso restringido
spec:
  type: team
  children: []
---
apiVersion: backstage.io/v1alpha1
kind: User
metadata:
  name: admin-user
spec:
  profile:
    email: admin@workshop.local
  memberOf: [platform-team]
---
apiVersion: backstage.io/v1alpha1
kind: User
metadata:
  name: dev-user
spec:
  profile:
    email: dev@workshop.local
  memberOf: [developers]
---
apiVersion: backstage.io/v1alpha1
kind: User
metadata:
  name: guest
spec:
  memberOf: [developers]
