# =============================================================================
# Gateway API - Punto de entrada HTTP/HTTPS para el cluster
# Reemplaza NGINX Ingress Controller con la API nativa de Kubernetes
# Gestionado por cloud-provider-kind
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: gateway-infra
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: workshop-gateway
  namespace: gateway-infra
spec:
  gatewayClassName: cloud-provider-kind
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
