apiVersion: v1
kind: Service
metadata:
  name: backstage
  namespace: backstage
  labels:
    app: backstage
    app.kubernetes.io/part-of: backstage
spec:
  selector:
    app: backstage
  ports:
    - port: 7007
      targetPort: 7007
      name: http
      nodePort: 30000
  type: NodePort
---
# Gateway API HTTPRoute (reemplaza Ingress)
# Requiere el Gateway desplegado en el paso 01
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backstage
  namespace: backstage
spec:
  parentRefs:
    - name: workshop-gateway
      namespace: gateway-infra
  hostnames:
    - "backstage.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: backstage
          port: 7007
