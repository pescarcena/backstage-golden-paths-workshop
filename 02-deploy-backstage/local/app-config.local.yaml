# =============================================================================
# Configuracion de Backstage para modo local (yarn start)
# Se usa con: yarn start --config app-config.yaml --config app-config.local.yaml
# =============================================================================

app:
  title: Workshop Golden Paths
  baseUrl: http://localhost:3000

organization:
  name: Workshop Golden Paths

backend:
  baseUrl: http://localhost:7007
  listen:
    port: 7007
  csp:
    connect-src: ["'self'", 'http:', 'https:']
  cors:
    origin: http://localhost:3000
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  database:
    client: pg
    connection:
      host: localhost
      port: 5432
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}

auth:
  providers:
    guest:
      dangerouslyAllowOutsideDevelopment: true

catalog:
  rules:
    - allow: [Component, System, API, Resource, Location, Template, User, Group]

techdocs:
  builder: 'local'
  generator:
    runIn: 'local'
  publisher:
    type: 'local'

permission:
  enabled: false
