# Keycloak para autenticacion en modo local
services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.5
    container_name: backstage-keycloak
    ports:
      - "8180:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin123
    command:
      - start-dev
      - --import-realm
    volumes:
      - ../shared/keycloak-realm.json:/opt/keycloak/data/import/backstage-realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
