# =============================================================================
# Secret con credenciales de auth para Backstage
# IMPORTANTE: En produccion, usa un gestor de secretos (Vault, AWS Secrets Manager, etc.)
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: backstage-auth-secrets
  namespace: backstage
type: Opaque
# ATENCION: Credenciales de ejemplo para el workshop.
# En produccion, use un gestor de secrets (Sealed Secrets, Vault, etc.)
stringData:
  # GitHub OAuth (rellena con tus valores)
  GITHUB_OAUTH_CLIENT_ID: "tu-client-id-aqui"
  GITHUB_OAUTH_CLIENT_SECRET: "tu-client-secret-aqui"
  # Keycloak
  KEYCLOAK_CLIENT_SECRET: "backstage-workshop-secret"
  # Secreto de sesion (requerido para OIDC)
  AUTH_SESSION_SECRET: "workshop-session-secret-change-in-production"
