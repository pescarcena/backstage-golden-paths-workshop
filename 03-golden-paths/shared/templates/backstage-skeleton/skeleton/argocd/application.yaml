apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: ${{ values.appName }}
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/${{ values.githubOrg }}/${{ values.repoName }}.git
    targetRevision: HEAD
    path: charts/app

    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: ${{ values.namespace }}

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true